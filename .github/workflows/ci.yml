name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  quality-and-tests:
    name: Lint, Unit, and Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            .pre-commit-config.yaml

      - name: Setup Java 17 for Spark
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install project tooling
        run: make init

      - name: Run pre-commit checks
        run: make precommit

      - name: Run lint checks
        run: make lint

      - name: Install dbt dependency
        run: ./.venv/bin/pip install -r requirements-dbt.txt

      - name: Resolve dbt slim CI selection (state:modified+)
        run: make dbt-slim-ci DBT_TARGET=dev

      - name: Validate dbt governance contracts
        run: make dbt-governance-validate

      - name: Validate Phase 3 policy artifacts
        run: make phase3-policy-validate

      - name: Run unit tests
        run: make test-unit

      - name: Run integration test (generator + batch ETL + Gold validation)
        run: make test-integration

      - name: Run ETL benchmark on sample dataset
        run: make benchmark-etl BENCHMARK_ROWS=2000 BENCHMARK_ITERATIONS=2 BENCHMARK_WARMUP_ITERATIONS=1 BENCHMARK_OUTPUT=perf/results/ci/etl-benchmark.json

      - name: Upload ETL benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: etl-benchmark-results
          path: |
            perf/results/ci/etl-benchmark.json
            perf/results/ci/etl-benchmark.md
          if-no-files-found: error
