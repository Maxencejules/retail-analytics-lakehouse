name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  quality-and-tests:
    name: Lint, Unit, and Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            .pre-commit-config.yaml

      - name: Setup Java 17 for Spark
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install project tooling
        run: make init

      - name: Run pre-commit checks
        run: make precommit

      - name: Run lint checks
        run: make lint

      - name: Run unit tests
        run: make test-unit

      - name: Run integration test (generator + batch ETL + Gold validation)
        run: make test-integration

