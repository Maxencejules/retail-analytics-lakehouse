version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
      - kafka-exporter
      - warehouse-exporter
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/slo-alerts.yml:/etc/prometheus/slo-alerts.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana-oss:11.2.2
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    command:
      - --kafka.server=${KAFKA_EXPORTER_SERVER:-kafka:9092}
    ports:
      - "9308:9308"

  warehouse-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: ${WAREHOUSE_EXPORTER_DSN:-postgresql://postgres:postgres@warehouse:5432/retail_analytics?sslmode=disable}
    ports:
      - "9187:9187"

  marquez-db:
    image: postgres:15
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    ports:
      - "5433:5432"

  marquez:
    image: marquezproject/marquez:0.50.0
    depends_on:
      - marquez-db
    environment:
      POSTGRES_URL: jdbc:postgresql://marquez-db:5432/marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      - "5000:5000"
      - "5001:5001"
