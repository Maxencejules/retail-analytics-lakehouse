global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: airflow-metrics
    static_configs:
      - targets: ["airflow-webserver:9112"]
    metrics_path: /metrics

  - job_name: spark-metrics
    static_configs:
      - targets: ["spark:4040"]
    metrics_path: /metrics/executors/prometheus

  - job_name: marquez
    static_configs:
      - targets: ["marquez:5000"]
    metrics_path: /api/v1/metrics

