version: 2

models:
  - name: dim_customer
    description: Customer dimension with deterministic surrogate key.
    config:
      tags: ["governed", "phase2", "dimension"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: true
        pii_policy: masked_in_serving
        contract_name: dim_customer_v1
    columns:
      - name: customer_sk
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_segment
        tests:
          - not_null

  - name: dim_customer_scd2
    description: Customer SCD2 dimension generated from dbt snapshots.
    config:
      tags: ["governed", "phase2", "dimension", "scd2"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: true
        pii_policy: masked_in_serving
        contract_name: dim_customer_scd2_v1
    columns:
      - name: customer_version_sk
        tests:
          - not_null
          - unique
      - name: customer_sk
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: valid_from_utc
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

  - name: dim_product
    description: Product dimension with deterministic surrogate key.
    config:
      tags: ["governed", "phase2", "dimension"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: false
        contract_name: dim_product_v1
    columns:
      - name: product_sk
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
          - unique
      - name: category
        tests:
          - not_null

  - name: dim_store
    description: Store dimension with deterministic surrogate key.
    config:
      tags: ["governed", "phase2", "dimension"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: false
        contract_name: dim_store_v1
    columns:
      - name: store_sk
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null
          - unique
      - name: region
        tests:
          - not_null

  - name: dim_time
    description: Calendar time dimension by date.
    config:
      tags: ["governed", "phase2", "dimension"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: false
        contract_name: dim_time_v1
    columns:
      - name: time_sk
        tests:
          - not_null
          - unique
      - name: full_date
        tests:
          - not_null
          - unique
          - not_future_date

  - name: fact_sales
    description: Fact table at one row per transaction.
    config:
      tags: ["governed", "phase2", "fact"]
      meta:
        owner: analytics-engineering
        data_tier: gold
        contains_pii: false
        semantic_contract: retail_sales_v1
        contract_name: fact_sales_v1
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: time_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_time')
              field: time_sk
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
      - name: product_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: store_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_sk
      - name: quantity
        tests:
          - not_null
          - non_negative
      - name: revenue
        tests:
          - not_null
          - non_negative
      - name: unit_price
        tests:
          - not_null
          - non_negative
      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ["CAD", "USD"]
      - name: channel
        tests:
          - not_null
          - accepted_values:
              values: ["online", "store"]
      - name: ingestion_date
        tests:
          - not_null
          - not_future_date
