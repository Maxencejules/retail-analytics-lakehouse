version: 2

models:
  - name: mrt_revenue_by_region
    description: Daily revenue model for regional executive reporting.
    columns:
      - name: report_date
        tests:
          - not_null
      - name: region
        tests:
          - not_null
      - name: revenue_amount
        tests:
          - not_null
          - non_negative

  - name: mrt_top_products_last_30_days
    description: Product ranking model for the latest 30-day window.
    columns:
      - name: product_id
        tests:
          - not_null
      - name: revenue_30d
        tests:
          - not_null
          - non_negative
      - name: rank_30d
        tests:
          - not_null

  - name: mrt_customer_segmentation
    description: Customer segmentation model based on LTV, recency, and frequency.
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: lifetime_value
        tests:
          - not_null
          - non_negative
      - name: segment_bucket
        tests:
          - not_null
          - accepted_values:
              values: ["Champions", "Loyal", "At Risk", "Emerging"]

